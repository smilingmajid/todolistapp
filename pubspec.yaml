name: todolistapp
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  path_provider: ^2.1.1
  get: ^4.7.2
  random_avatar: ^0.0.8
  iconsax: ^0.0.8
  flutter_advanced_drawer: ^1.4.0
  lucide_icons_flutter: ^2.0.3
  line_icons: ^2.0.3
  url_launcher: ^6.3.1
  animated_text_kit: ^4.2.3
  uuid: ^4.5.1
  fl_chart: ^1.0.0
  mesh_gradient: ^1.3.8
  lottie: ^3.3.1
  country_picker: ^2.0.27
  introduction_screen: ^3.1.17

  intl: ^0.19.0
  flutter_i18n: ^0.36.3
  flutter_localizations:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/empty.json
    - assets/image/
    - assets/fonts/
    - assets/i18n/   

  fonts:
    - family: ClashDisplay
      fonts:
        - asset: assets/fonts/ClashDisplay-Regular.otf
          weight: 400
        - asset: assets/fonts/ClashDisplay-Bold.otf
          weight: 700
        - asset: assets/fonts/ClashDisplay-Medium.otf
          weight: 500
        - asset: assets/fonts/ClashDisplay-Semibold.otf
          weight: 600
        - asset: assets/fonts/ClashDisplay-Light.otf
          weight: 300
        - asset: assets/fonts/ClashDisplay-Extralight.otf
          weight: 200
